name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel any in-progress run for the same branch / PR when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat every rustc warning and every clippy lint as an error.
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

jobs:
  check:
    name: Check (fmt + clippy + doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo clippy
        # --all-targets covers lib, bins, examples, tests, and benchmarks.
        run: cargo clippy --all-targets

      - name: cargo doc
        run: cargo doc --no-deps

  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

  msrv:
    name: MSRV (1.77)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.77

      # Separate cache key so the MSRV build artefacts don't pollute the
      # stable build cache and vice-versa.
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.77

      - name: cargo test
        run: cargo test
